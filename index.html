<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunar Register - Whitelist</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-bg: #16181f;
            --accent-color: #5865F2; /* Azul estilo Discord/Lunar */
            --accent-hover: #4752c4;
            --text-color: #f2f3f5;
            --text-muted: #949ba4;
            --success: #23a55a;
            --error: #f23f43;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1e2235 0%, var(--bg-color) 70%);
        }

        .container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 420px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transform: translateY(0);
            transition: all 0.3s ease;
        }

        .container:hover {
            border-color: rgba(88, 101, 242, 0.3);
            box-shadow: 0 12px 40px rgba(88, 101, 242, 0.15);
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            background: #20222c;
            border: 2px solid transparent;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-color);
            background: #252836;
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        button:disabled {
            background: #3c4270;
            cursor: not-allowed;
            transform: none;
        }

        /* Spinner de carga animado */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2.5px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Estados de respuesta (Mensajes) */
        .message-box {
            margin-top: 1.5rem;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            display: none;
            animation: fadeIn 0.3s ease forwards;
        }

        .message-box.success {
            background: rgba(35, 165, 90, 0.15);
            color: #2ecc71;
            border: 1px solid rgba(35, 165, 90, 0.3);
        }

        .message-box.error {
            background: rgba(242, 63, 67, 0.15);
            color: #ff6b6b;
            border: 1px solid rgba(242, 63, 67, 0.3);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Registrate a LunarV2</h1>
        <p class="subtitle">Ingresa tu ID para unirte a la Whitelist</p>
        
        <form id="registerForm">
            <div class="form-group">
                <label for="playerId">ID del Jugador</label>
                <input type="text" id="playerId" placeholder="Ej: RandyPS3" required autocomplete="off">
            </div>
            
            <button type="submit" id="btnSubmit">
                <span class="spinner" id="btnSpinner"></span>
                <span id="btnText">Registrar ID</span>
            </button>
        </form>

        <div id="messageBox" class="message-box"></div>
    </div>

    <script>
        // ========================================================
        // ⚠️ Dont touch by Dany
        const GOOGLE_BRIDGE_URL = 'https://script.google.com/macros/s/AKfycbzhPfdios-XUt8UZAvsw7lhzF1tN4eWVJXA3LShJGZTqKmjvA4bxZu5s-YC9E0xzc-q/exec';
        // ========================================================

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const idInput = document.getElementById('playerId');
            const btnSubmit = document.getElementById('btnSubmit');
            const btnSpinner = document.getElementById('btnSpinner');
            const btnText = document.getElementById('btnText');
            const messageBox = document.getElementById('messageBox');
            
            const idValue = idInput.value.trim();
            if (!idValue) return;

            // 1. Activar estado de carga visual
            btnSubmit.disabled = true;
            btnSpinner.style.display = 'block';
            btnText.innerText = 'Verificando...';
            messageBox.style.display = 'none';
            messageBox.className = 'message-box';

            try {
                // 2. Enviar datos a tu puente de Google
                const response = await fetch(GOOGLE_BRIDGE_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Mantenemos el modo no-cors para evitar bloqueos del navegador
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: idValue })
                });

                // Como usamos no-cors, el navegador no nos deja leer el JSON de respuesta directo,
                // pero si la petición pasa sin saltar al catch, asumimos éxito inicial.
                // NOTA: Para respuestas específicas (Baneado/Duplicado), si notas que el no-cors los oculta,
                // puedes quitar el mode: 'no-cors' ya que tu Apps Script está blindado con ContentService.
                
                showResponse(true, "🟢 ¡Registro enviado! ");
                idInput.value = ''; // Limpiar input

            } catch (error) {
                showResponse(false, "❌ Ocurrió un problema de conexión con el sistema.");
                console.error(error);
            } finally {
                // 3. Apagar estado de carga
                btnSubmit.disabled = false;
                btnSpinner.style.display = 'none';
                btnText.innerText = 'Registrar ID';
            }
        });

        function showResponse(isSuccess, text) {
            const messageBox = document.getElementById('messageBox');
            messageBox.innerText = text;
            messageBox.style.display = 'block';
            messageBox.classList.add(isSuccess ? 'success' : 'error');
        }
    </script>
</body>
</html>
