<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunar Register</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #0c0c0e;
            color: #e1e1e6;
        }
        .box {
            background: #14141c;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 1px solid #232330;
            width: 320px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 25px;
            color: #ececed;
            letter-spacing: 1px;
            font-weight: 600;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }
        input[type="text"] {
            padding: 14px;
            width: 85%;
            background: #0c0c0e;
            border: 2px solid #232330;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            outline: none;
            text-align: center;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            border-color: #00b37e;
        }
        button {
            padding: 14px;
            width: 95%;
            background-color: #00b37e;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover {
            background-color: #00875f;
        }
        button:active {
            transform: scale(0.98);
        }
        #message {
            margin-top: 20px;
            font-size: 14px;
            min-height: 20px;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>Lunar Register</h1>
    <div class="input-group">
        <input type="text" id="playerName" placeholder="Tu Gamertag">
        <button id="readyBtn">Ready</button>
    </div>
    <div id="message"></div>
</div>

<script>
    // URL de tu Webhook de Discord vinculada con éxito
    const DISCORD_WEBHOOK_URL = 'https://discord.com/api/webhooks/1513455753879617608/OuBqEoakGyYyssg_yGovCmOkBNg2U0ZPA_v2Zj8V18s1-RCR9OSiRTCOzP_91Yd_yXQj';

    document.getElementById('readyBtn').addEventListener('click', async () => {
        const player = document.getElementById('playerName').value.trim();
        const messageDiv = document.getElementById('message');

        if (!player) {
            messageDiv.style.color = "#f75a68";
            messageDiv.innerText = "Escribe un Gamertag primero.";
            return;
        }

        // Limpiar el texto para mantener el formato estándar de un usuario
        const cleanName = player.replace(/[^a-zA-Z0-9_-]/g, '');

        messageDiv.style.color = "#8d8d99";
        messageDiv.innerText = "Enviando solicitud...";

        // Diseño del recuadro (Embed) que llegará a Discord
        const payload = {
            embeds: [{
                title: "🟢 Nueva Solicitud de Whitelist",
                color: 45822, 
                fields: [
                    {
                        name: "Gamertag / Usuario",
                        value: `\`${cleanName}\``,
                        inline: true
                    },
                    {
                        name: "Estado",
                        value: "Pendiente de agregar",
                        inline: true
                    }
                ],
                timestamp: new Date().toISOString()
            }]
        };

        try {
            const response = await fetch(DISCORD_WEBHOOK_URL, {
                method: "POST",
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                messageDiv.style.color = "#00b37e";
                messageDiv.innerText = `¡${cleanName} enviado al registro!`;
                document.getElementById('playerName').value = ""; 
            } else {
                messageDiv.style.color = "#f75a68";
                messageDiv.innerText = "Error al enviar al servidor de Discord.";
            }
        } catch (error) {
            messageDiv.style.color = "#f75a68";
            messageDiv.innerText = "Error de conexión con la red.";
        }
    });
</script>

</body>
</html>
