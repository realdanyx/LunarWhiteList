<!DOCTYPE html>
<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunar Register</title>

            height: 100vh;
            margin: 0;
            background-color: #0c0c0e;
            color: #e1e1e6;
        }
        .box {
            background: #14141c;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 1px solid #232330;
            width: 320px;

            gap: 15px;

        }

            width: 85%;
            background: #0c0c0e;
            border: 2px solid #232330;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            outline: none;
            text-align: center;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            border-color: #5865F2;
        }
        button {

            width: 95%;
            background-color: #5865F2;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover {
            background-color: #4752c4;
        }
        button:active {
            transform: scale(0.98);
        }
        #message {
            margin-top: 20px;
            font-size: 14px;

        }
    </style>
</head>
