<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunar Register</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #0c0c0e;
            color: #e1e1e6;
        }
        .box {
            background: #14141c;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 1px solid #232330;
            width: 320px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 25px;
            color: #ececed;
            letter-spacing: 1px;
            font-weight: 600;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }
        input[type="text"] {
            padding: 14px;
            width: 85%;
            background: #0c0c0e;
            border: 2px solid #232330;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            outline: none;
            text-align: center;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            border-color: #00b37e;
        }
        button {
            padding: 14px;
            width: 95%;
            background-color: #00b37e;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover {
            background-color: #00875f;
        }
        button:active {
            transform: scale(0.98);
        }
        #message {
            margin-top: 20px;
            font-size: 14px;
            min-height: 20px;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>Lunar Register</h1>
    <div class="input-group">
        <input type="text" id="playerName" placeholder="Tu ID / Gamertag">
        <button id="readyBtn">Ready</button>
    </div>
    <div id="message"></div>
</div>

<script>
    document.getElementById('readyBtn').addEventListener('click', async () => {
        const player = document.getElementById('playerName').value.trim();
        const messageDiv = document.getElementById('message');

        if (!player) {
            messageDiv.style.color = "#f75a68";
            messageDiv.innerText = "Escribe un ID primero.";
            return;
        }

        // Limpiar el texto para evitar exploits
        const cleanName = player.replace(/[^a-zA-Z0-9_-]/g, '');

        messageDiv.style.color = "#8d8d99";
        messageDiv.innerText = "Procesando registro...";

        try {
            // Enviamos el ID al backend en PHP
            const response = await fetch('guardar.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: cleanName })
            });

            const data = await response.json();

            if (response.status === 200) {
                messageDiv.style.color = "#00b37e";
                messageDiv.innerText = `¡${cleanName} agregado y anunciado!`;
                document.getElementById('playerName').value = ""; 
            } else if (response.status === 409) {
                messageDiv.style.color = "#ffb84d";
                messageDiv.innerText = "Este ID ya está registrado.";
            } else {
                messageDiv.style.color = "#f75a68";
                messageDiv.innerText = data.error || "Error en el servidor.";
            }
        } catch (error) {
            messageDiv.style.color = "#f75a68";
            messageDiv.innerText = "Error de conexión con el servidor.";
        }
    });
</script>

</body>
</html>
