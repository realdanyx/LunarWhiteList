<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunar Register - Whitelist</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #060709;
            --card-bg: rgba(22, 24, 31, 0.85); 
            --accent-color: #5865F2; 
            --accent-hover: #4752c4;
            --text-color: #f2f3f5;
            --text-muted: #949ba4;
            --success: #23a55a;
            --error: #f23f43;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            background-image: radial-gradient(circle at 50% 50%, #171a2b 0%, var(--bg-color) 80%);
        }

        /* ----- EFECTO DE ESTRELLAS CAYENDO ----- */
        .starfall-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .star {
            position: absolute;
            top: -50px;
            width: 2px;
            height: 40px;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0.7));
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(-20deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(105vh) rotate(-20deg); opacity: 0; }
        }

        /* ----- EFECTO DE LOGOS CAYENDO (ESCASA Y LENTAMENTE) ----- */
        .falling-logo {
            position: absolute;
            top: -60px;
            width: 32px;  /* Forzado a 32x32 */
            height: 32px;
            object-fit: contain;
            opacity: 0;
            filter: drop-shadow(0 0 8px rgba(88, 101, 242, 0.2));
            animation: logoFall linear infinite;
        }

        @keyframes logoFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; } /* Opacidad suave para no molestar la vista */
            90% { opacity: 0.3; }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0; } /* Gira lento al caer */
        }

        /* ----- CONTENEDOR PRINCIPAL ----- */
        .container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            width: 100%;
            max-width: 420px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            z-index: 1;
            transition: all 0.3s ease;
        }

        .container:hover {
            border-color: rgba(88, 101, 242, 0.3);
            box-shadow: 0 20px 60px rgba(88, 101, 242, 0.15);
        }

        /* ESPACIO PARA EL LOGO PRINCIPAL */
        .logo-box {
            width: 130px; 
            height: 130px;
            margin: 0 auto 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .logo-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 12px rgba(88, 101, 242, 0.4));
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            margin-bottom: 0.4rem;
            background: linear-gradient(90deg, #fff, #b9bbbe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            background: #1b1d26;
            border: 2px solid transparent;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-color);
            background: #202330;
            box-shadow: 0 0 15px rgba(88, 101, 242, 0.2);
        }

        /* ----- BOTÓN PREMIUM ----- */
        button {
            width: 100%;
            padding: 15px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            background: var(--accent-hover);
        }

        /* EFECTO ARCOÍRIS AL QUEDAR PRESIONADO */
        button:active {
            background: linear-gradient(90deg, #ff0055, #00ffcc, #9900ff, #ff9900, #ff0055);
            background-size: 300% 100%;
            animation: rainbowWave 1s linear infinite;
            transform: scale(0.97);
        }

        @keyframes rainbowWave {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        /* Bloqueo Rojo si está Baneado */
        button.is-banned {
            background: var(--error) !important;
            box-shadow: 0 0 20px rgba(242, 63, 67, 0.4);
            cursor: not-allowed;
            transform: none !important;
        }

        button:disabled:not(.is-banned) {
            background: #2b2f4a;
            cursor: not-allowed;
        }

        /* ----- CARGADOR ELEGANTE ----- */
        .elegant-loader {
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
            border-radius: 50%;
            animation: elegant-spin 1.2s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            display: none;
            filter: drop-shadow(0 0 5px #fff);
        }

        @keyframes elegant-spin {
            0% { transform: rotate(0deg) scale(0.9); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(0.9); }
        }

        /* MENSAJES */
        .message-box {
            margin-top: 1.5rem;
            padding: 14px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            display: none;
            animation: fadeIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .message-box.success {
            background: rgba(35, 165, 90, 0.15);
            color: #2ecc71;
            border: 1px solid rgba(35, 165, 90, 0.3);
        }

        .message-box.error {
            background: rgba(242, 63, 67, 0.15);
            color: #ff6b6b;
            border: 1px solid rgba(242, 63, 67, 0.3);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="starfall-container">
        <div class="star" style="left: 5%; animation-duration: 3.2s; animation-delay: 0s;"></div>
        <div class="star" style="left: 22%; animation-duration: 4.5s; animation-delay: 1.2s;"></div>
        <div class="star" style="left: 55%; animation-duration: 5.0s; animation-delay: 2.1s;"></div>
        <div class="star" style="left: 78%; animation-duration: 4.1s; animation-delay: 1.7s;"></div>
        <div class="star" style="left: 93%; animation-duration: 2.5s; animation-delay: 0.2s;"></div>

        <img src="logo.png" class="falling-logo" style="left: 12%; animation-duration: 14s; animation-delay: 0s;">
        <img src="logo.png" class="falling-logo" style="left: 42%; animation-duration: 18s; animation-delay: 3s;">
        <img src="logo.png" class="falling-logo" style="left: 85%; animation-duration: 15s; animation-delay: 6s;">
    </div>

    <div class="container">
        <div class="logo-box">
            <img src="logo.png" alt="Server Logo">
        </div>

        <h1>LUNAR REGISTER</h1>
        <p class="subtitle">Ingresa tu ID para unirte a la Whitelist</p>
        
        <form id="registerForm">
            <div class="form-group">
                <label for="playerId">ID del Jugador</label>
                <input type="text" id="playerId" placeholder="Ej: AzeY_TheBest" required autocomplete="off">
            </div>
            
            <button type="submit" id="btnSubmit">
                <span class="elegant-loader" id="btnLoader"></span>
                <span id="btnText">Registrar ID</span>
            </button>
        </form>

        <div id="messageBox" class="message-box"></div>
    </div>

    <script>
        // ========================================================
        // ⚠️ Script, dont touch
        const GOOGLE_BRIDGE_URL = 'https://script.google.com/macros/s/AKfycbzhPfdios-XUt8UZAvsw7lhzF1tN4eWVJXA3LShJGZTqKmjvA4bxZu5s-YC9E0xzc-q/exec';
        // ========================================================

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const idInput = document.getElementById('playerId');
            const btnSubmit = document.getElementById('btnSubmit');
            const btnLoader = document.getElementById('btnLoader');
            const btnText = document.getElementById('btnText');
            const messageBox = document.getElementById('messageBox');
            
            const idValue = idInput.value.trim();
            if (!idValue) return;

            btnSubmit.classList.remove('is-banned');
            btnSubmit.disabled = true;
            btnLoader.style.display = 'block';
            btnText.style.display = 'none'; 
            messageBox.style.display = 'none';
            messageBox.className = 'message-box';

            try {
                const response = await fetch(GOOGLE_BRIDGE_URL, {
                    method: 'POST',
                    body: JSON.stringify({ id: idValue })
                });

                const data = await response.json();

                if (data.status === 200) {
                    showResponse(true, "🟢 ¡ID registrado con éxito! Ya puedes entrar.");
                    idInput.value = '';
                    btnText.innerText = 'Registrar ID';
                } else if (data.status === 403) {
                    showResponse(false, data.error || "❌ Estás baneado de este servidor.");
                    btnText.innerText = "❌ BANEADO";
                    btnSubmit.classList.add('is-banned');
                } else {
                    showResponse(false, data.error || "❌ Ocurrió un problema en el registro.");
                    btnText.innerText = 'Registrar ID';
                }

            } catch (error) {
                showResponse(false, "❌ Error de conexión con el sistema.");
                btnText.innerText = 'Registrar ID';
                console.error(error);
            } finally {
                if (!btnSubmit.classList.contains('is-banned')) {
                    btnSubmit.disabled = false;
                }
                btnLoader.style.display = 'none';
                btnText.style.display = 'inline';
            }
        });

        function showResponse(isSuccess, text) {
            const messageBox = document.getElementById('messageBox');
            messageBox.innerText = text;
            messageBox.style.display = 'block';
            messageBox.classList.add(isSuccess ? 'success' : 'error');
        }
    </script>
</body>
</html>
